services:
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.82.4-nightly
    container_name: litellm
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
      - ./.env:/app/.env
      - ./data:/root/.litellm
      - ./auth:/root/.config/litellm
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: always

  gateway:
    build: ./gateway
    container_name: litellm-gateway
    ports:
      - "127.0.0.1:2555:2555"
    volumes:
      - ./.env:/app/.env
      - ./litellm_config.yaml:/app/litellm_config.yaml
      - ./auth:/app/auth:ro
      - ./data/gateway:/app/data
    env_file:
      - .env
    environment:
      - PROXY_LITELLM_HOST=litellm
      - PROXY_LITELLM_PORT=4000
      - PROXY_MAX_WORKERS=64
      - PROXY_MODEL_ALIAS_STATE=/app/data/model-alias.json
    depends_on:
      - litellm
    restart: always
