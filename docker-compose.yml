services:
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.82.4-nightly
    container_name: litellm
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
      - ./.env:/app/.env
      - ./data:/root/.litellm
      - ./auth:/root/.config/litellm
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s

  gateway:
    build: ./gateway
    container_name: litellm-gateway
    ports:
      - "127.0.0.1:2555:2555"
    volumes:
      - ./.env:/app/.env
      - ./litellm_config.yaml:/app/litellm_config.yaml
      - ./auth:/app/auth:ro
    env_file:
      - .env
    environment:
      - PROXY_LITELLM_HOST=litellm
      - PROXY_LITELLM_PORT=4000
      - PROXY_MAX_WORKERS=64
    depends_on:
      litellm:
        condition: service_healthy
    restart: always
